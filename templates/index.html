<script src="config.js?t=20260118"></script>
<script>
    function switchTab(tab) {
        const f = document.getElementById('fastForm'), l = document.getElementById('loginForm'), tr = document.getElementById('tabRegister'), tl = document.getElementById('tabLogin'), fp = document.getElementById('forgotPass');
        if (tab === 'register') { f.classList.remove('hidden'); l.classList.add('hidden'); if(fp) fp.classList.remove('hidden'); tr.classList.add('bg-surface-container-lowest','text-primary','shadow-sm'); tr.classList.remove('text-on-surface-variant'); tl.classList.remove('bg-surface-container-lowest','text-primary','shadow-sm'); tl.classList.add('text-on-surface-variant'); } else { f.classList.add('hidden'); l.classList.remove('hidden'); if(fp) fp.classList.add('hidden'); tl.classList.add('bg-surface-container-lowest','text-primary','shadow-sm'); tl.classList.remove('text-on-surface-variant'); tr.classList.remove('bg-surface-container-lowest','text-primary','shadow-sm'); tr.classList.add('text-on-surface-variant'); }
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const m = document.getElementById('matricula').value, p = document.getElementById('password').value, b = document.getElementById('loginBtn'), t = document.getElementById('loginBtnText'), ri = b.querySelector('.material-symbols-outlined');
        b.disabled = true; t.innerText = 'ENTRANDO...'; ri.innerText = 'sync'; ri.classList.add('animate-spin'); document.getElementById('message').innerText = "";
        try {
            const r = await apiFetch(`/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ matricula: m, password: p }) });
            if (r && r.ok) { const d = await r.json(); localStorage.setItem('ponto_token', d.token); localStorage.setItem('user_role', d.role); localStorage.setItem('user_name', d.name); localStorage.setItem('user_matricula', m); localStorage.setItem('user_cargo', d.cargo || 'Funcionario'); window.location.href = d.role === 'admin' ? 'admin.html' : 'dashboard.html'; }
            else { document.getElementById('message').innerText = 'Erro na autenticação'; b.disabled = false; t.innerText = 'ENTRAR NO SISTEMA'; ri.innerText = 'login'; ri.classList.remove('animate-spin'); }
        } catch { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('radarScreen').style.display='flex'; if (window.startRadarMode) window.startRadarMode((s) => { document.getElementById('radarStatus').innerHTML = s; }); }
    });
    setInterval(() => {
        const n = new Date(); document.getElementById('fastClock').innerText = n.toLocaleTimeString('pt-BR');
        const o = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }; let ds = n.toLocaleDateString('pt-BR', o);
        document.getElementById('fastDate').innerText = ds.charAt(0).toUpperCase() + ds.slice(1);
    }, 1000);
    document.getElementById('fastForm').addEventListener('submit', async (e) => {
        e.preventDefault(); const m = document.getElementById('fastMatricula').value, p = document.getElementById('fastPassword').value, tp = document.getElementById('fastType').value, b = document.getElementById('fastBtn'), t = document.getElementById('fastBtnText'), ri = b.querySelector('.material-symbols-outlined');
        b.disabled = true; t.innerText = 'LENDO GPS...'; ri.innerText = 'sync'; ri.classList.add('animate-spin');
        if (!navigator.geolocation) { alert("Sem GPS!"); b.disabled = false; t.innerText = 'REGISTRAR PONTO'; return; }
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const lr = await apiFetch(`/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ matricula: m, password: p }) });
                if (!lr || !lr.ok) { alert('Senha incorreta!'); } else {
                    const ld = await lr.json();
                    
                    t.innerText = 'OBTENDO ENDEREÇO...';
                    let geocodedNeighborhood = "Desconhecido";
                    let geocodedCity = "Vitória - ES";
                    let fullAddress = "";
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, {
                            headers: { 'User-Agent': 'PontoEletronicoApp/1.2' }
                        });
                        const data = await response.json();
                        const addr = data.address || {};
                        geocodedCity = (addr.city || addr.town || addr.village || addr.municipality || "Vitória") + " - ES";
                        geocodedNeighborhood = addr.suburb || addr.neighbourhood || addr.neighbourhood_level2 || addr.hamlet || addr.residential || addr.district || "Desconhecido";
                        fullAddress = data.display_name;
                        
                        // AUTO-CORRECT: Santa Clara -> Jardim da Penha
                        if (geocodedCity.includes("Vitória") && (geocodedNeighborhood.includes("Santa Clara") || geocodedNeighborhood === "Vitória")) {
                            geocodedNeighborhood = "Jardim da Penha";
                        }
                    } catch (geoError) {
                        console.warn("Geocoding failed, using coordinates only.");
                    }

                    t.innerText = 'SALVANDO...';
                    const pr = await apiFetch(`/api/punch`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ld.token}` }, body: JSON.stringify({ type: tp, latitude: lat, longitude: lon, accuracy: pos.coords.accuracy, neighborhood: geocodedNeighborhood, city: geocodedCity, full_address: fullAddress, transaction_id: 'fast_' + Date.now() }) });
                    if (pr.ok) { alert(`PONTO REGISTRADO!`); document.getElementById('fastForm').reset(); } else { alert("Erro ao registrar."); }
                }
            } catch { alert('Erro de conexão.'); }
            b.disabled = false; t.innerText = 'REGISTRAR PONTO'; ri.innerText = 'fingerprint'; ri.classList.remove('animate-spin');
        }, () => { alert("Ative o GPS!"); b.disabled = false; t.innerText = 'REGISTRAR PONTO'; }, { enableHighAccuracy: true, timeout: 15000 });
    });
    switchTab('register');
</script>
