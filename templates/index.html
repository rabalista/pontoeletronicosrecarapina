<script src="config.js?t=20260118"></script>
<script>
    function switchTab(tab) {
        const f = document.getElementById('fastForm'), l = document.getElementById('loginForm'), tr = document.getElementById('tabRegister'), tl = document.getElementById('tabLogin'), fp = document.getElementById('forgotPass');
        if (tab === 'register') { f.classList.remove('hidden'); l.classList.add('hidden'); if(fp) fp.classList.remove('hidden'); tr.classList.add('bg-surface-container-lowest','text-primary','shadow-sm'); tr.classList.remove('text-on-surface-variant'); tl.classList.remove('bg-surface-container-lowest','text-primary','shadow-sm'); tl.classList.add('text-on-surface-variant'); } else { f.classList.add('hidden'); l.classList.remove('hidden'); if(fp) fp.classList.add('hidden'); tl.classList.add('bg-surface-container-lowest','text-primary','shadow-sm'); tl.classList.remove('text-on-surface-variant'); tr.classList.remove('bg-surface-container-lowest','text-primary','shadow-sm'); tr.classList.add('text-on-surface-variant'); }
    }
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const m = document.getElementById('matricula').value, p = document.getElementById('password').value, b = document.getElementById('loginBtn'), t = document.getElementById('loginBtnText'), ri = b.querySelector('.material-symbols-outlined');
        b.disabled = true; t.innerText = 'ENTRANDO...'; ri.innerText = 'sync'; ri.classList.add('animate-spin'); document.getElementById('message').innerText = "";
        try {
            const r = await apiFetch(`/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ matricula: m, password: p }) });
            if (r && r.ok) { const d = await r.json(); localStorage.setItem('ponto_token', d.token); localStorage.setItem('user_role', d.role); localStorage.setItem('user_name', d.name); localStorage.setItem('user_matricula', m); localStorage.setItem('user_cargo', d.cargo || 'Funcionario'); window.location.href = d.role === 'admin' ? 'admin.html' : 'dashboard.html'; }
            else { document.getElementById('message').innerText = 'Erro na autenticação'; b.disabled = false; t.innerText = 'ENTRAR NO SISTEMA'; ri.innerText = 'login'; ri.classList.remove('animate-spin'); }
        } catch { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('radarScreen').style.display='flex'; if (window.startRadarMode) window.startRadarMode((s) => { document.getElementById('radarStatus').innerHTML = s; }); }
    });
    setInterval(() => {
        const n = new Date(); document.getElementById('fastClock').innerText = n.toLocaleTimeString('pt-BR');
        const o = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }; let ds = n.toLocaleDateString('pt-BR', o);
        document.getElementById('fastDate').innerText = ds.charAt(0).toUpperCase() + ds.slice(1);
    }, 1000);
    function getStickyLocation() {
        try {
            const s = localStorage.getItem('sticky_location');
            if (!s) return null;
            const d = JSON.parse(s);
            if (Date.now() - d.ts > 30 * 24 * 60 * 60 * 1000) return null;
            return d;
        } catch (e) { return null; }
    }

    async function getFastLocation() {
        // Local Network Specific Correction (Praia do Canto SRE)
        if (window.location.hostname === '10.131.248.219' || window.location.hostname === '10.131.248.250') {
            return { lat: -20.30, lon: -40.29, neighborhood: "Praia do Canto", city: "Vitória - ES", full_address: "Rede Local SRE", accuracy: 50 };
        }

        const sticky = getStickyLocation();
        
        try {
            // Try GPS with 6s timeout
            const pos = await new Promise((res, rej) => {
                if (!navigator.geolocation) rej();
                navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 6000 });
            });
            
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            try {
                const geoResp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`, { headers: { 'User-Agent': 'PontoEletronicoApp/1.2' } });
                const geoData = await geoResp.json();
                const addr = geoData.address || {};
                let city = (addr.city || addr.town || addr.village || addr.municipality || "Vitória") + " - ES";
                let neighborhood = addr.suburb || addr.neighbourhood || addr.neighbourhood_level2 || addr.hamlet || addr.residential || addr.district || "Desconhecido";
                
                if (city.includes("Vitória") && (neighborhood.includes("Santa Clara") || neighborhood === "Vitória")) {
                    neighborhood = "Jardim da Penha";
                }
                return { lat, lon, neighborhood, city, full_address: geoData.display_name, accuracy: pos.coords.accuracy };
            } catch {
                return { lat, lon, neighborhood: sticky?.neighborhood || "Desconhecido", city: sticky?.city || "Vitória - ES", accuracy: pos.coords.accuracy };
            }
        } catch (e) {
            // GPS Failed/Timeout -> Try IP Fallback
            if (sticky) return { lat: 0, lon: 0, ...sticky, full_address: "Localização Salva (Sticky)", accuracy: 5000 };
            
            try {
                const ipRes = await Promise.any([
                    fetch('https://ipapi.co/json/').then(r => r.json()),
                    fetch('https://ipwho.is/').then(r => r.json()),
                    fetch('https://freeipapi.com/api/json').then(r => r.json())
                ]);
                let city = (ipRes.city || ipRes.cityName || "Vitória") + " - ES";
                let neighborhood = ipRes.city === 'Vitória' ? "Jardim da Penha" : "Desconhecido";
                return { lat: ipRes.latitude || 0, lon: ipRes.longitude || 0, neighborhood, city, full_address: "IP Localizado", accuracy: 10000 };
            } catch {
                return { lat: 0, lon: 0, neighborhood: "Desconhecido", city: "Vitória - ES", full_address: "Sem Localização", accuracy: 99999 };
            }
        }
    }

    document.getElementById('fastForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 
        const m = document.getElementById('fastMatricula').value, 
              p = document.getElementById('fastPassword').value, 
              tp = document.getElementById('fastType').value, 
              b = document.getElementById('fastBtn'), 
              t = document.getElementById('fastBtnText'), 
              ri = b.querySelector('.material-symbols-outlined');
        
        b.disabled = true; 
        t.innerText = 'AUTENTICANDO...'; 
        ri.innerText = 'sync'; 
        ri.classList.add('animate-spin');

        try {
            const lr = await apiFetch(`/api/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ matricula: m, password: p }) });
            if (!lr || !lr.ok) { 
                alert('Senha incorreta!'); 
                b.disabled = false; t.innerText = 'REGISTRAR PONTO'; ri.innerText = 'fingerprint'; ri.classList.remove('animate-spin');
                return;
            }
            const ld = await lr.json();
            
            t.innerText = 'LOCALIZANDO...';
            const loc = await getFastLocation();

            t.innerText = 'SALVANDO...';
            const pr = await apiFetch(`/api/punch`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${ld.token}` }, 
                body: JSON.stringify({ 
                    type: tp, 
                    latitude: loc.lat, 
                    longitude: loc.lon, 
                    accuracy: loc.accuracy, 
                    neighborhood: loc.neighborhood, 
                    city: loc.city, 
                    full_address: loc.full_address, 
                    transaction_id: 'fast_' + Date.now() 
                }) 
            });

            if (pr.ok) { 
                alert(`PONTO REGISTRADO EM: ${loc.neighborhood}`); 
                document.getElementById('fastForm').reset(); 
            } else { 
                const err = await pr.json();
                alert("Erro: " + (err.message || "Falha ao registrar")); 
            }
        } catch (err) { 
            console.error(err);
            alert('Erro de conexão ou sistema.'); 
        } finally {
            b.disabled = false; 
            t.innerText = 'REGISTRAR PONTO'; 
            ri.innerText = 'fingerprint'; 
            ri.classList.remove('animate-spin');
        }
    });
    switchTab('register');

    async function loadNotifications() {
        const notifBell = document.getElementById('notifBell');
        const notifBadge = document.getElementById('notifBadge');
        const notifList = document.getElementById('notifList');
        let messages = [];
        
        const today = new Date();
        if (today.getDate() >= 1 && today.getDate() <= 5) {
            messages.push("ACESSE O LOGIN DO SERVIDOR PARA IMPRIMIR O SEU E-DOCS.");
        }
        
        try {
            const confRes = await fetch('/api/config/public');
            if (confRes.ok) {
                const cData = await confRes.json();
                if (cData.custom_notification && cData.custom_notification.trim() !== '') {
                    messages.push(cData.custom_notification);
                }
            }
        } catch(e) {}
        
        if (messages.length > 0) {
            notifBell.classList.remove('hidden');
            notifBadge.innerText = messages.length;
            notifBell.querySelector('.material-symbols-outlined').classList.add('bell-shake');
            
            notifList.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'p-4 text-xs text-on-surface hover:bg-surface-container-low transition-colors whitespace-pre-wrap';
                div.innerText = msg;
                notifList.appendChild(div);
            });
        }
    }
    
    function toggleNotifPanel() {
        const panel = document.getElementById('notifPanel');
        panel.classList.toggle('hidden');
        const icon = document.getElementById('notifBell').querySelector('.material-symbols-outlined');
        icon.classList.remove('bell-shake');
    }

    document.addEventListener('click', function(event) {
        const panel = document.getElementById('notifPanel');
        const bell = document.getElementById('notifBell');
        if (panel && bell && !panel.classList.contains('hidden')) {
            if (!panel.contains(event.target) && !bell.contains(event.target)) {
                panel.classList.add('hidden');
            }
        }
    });
    
    window.addEventListener('DOMContentLoaded', loadNotifications);
</script>
