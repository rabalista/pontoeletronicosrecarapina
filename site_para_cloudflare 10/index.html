<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponto Eletrônico - SRE CARAPINA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .radar-pulse {
            width: 100px;
            height: 100px;
            background-color: #0d6efd;
            border-radius: 50%;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(13, 110, 253, 0.7);
            }

            70% {
                transform: scale(1);
                box-shadow: 0 0 0 20px rgba(13, 110, 253, 0);
            }

            100% {
                transform: scale(0.95);
                box-shadow: 0 0 0 0 rgba(13, 110, 253, 0);
            }
        }
    </style>
</head>
<!-- Version 16.0 (Radar-Stable) - 2026-01-18 -->

<body class="d-flex flex-column align-items-center justify-content-center py-4"
    style="min-height: 100vh; background-color: #e3f2fd;">

    <!-- Login Screen Wrapper -->
    <div id="loginScreen" class="d-flex flex-column align-items-center justify-content-center w-100">

        <!-- Classic Header -->
        <div class="mb-4 text-center">
            <img src="https://cdn.es.gov.br/images/logo/governo/brasao/center/Brasao_Governo_500.png" alt="Brasão ES"
                class="img-fluid" style="max-height: 100px;">
        </div>

        <!-- Split Container -->
        <div class="container px-3" style="max-width: 900px;">
            <div class="row gx-4 gy-4 justify-content-center">
                <!-- FAST PUNCH COL -->
                <div class="col-md-6 d-flex align-items-stretch">
                    <div class="card shadow p-4 w-100 d-flex flex-column align-items-center justify-content-center text-center" style="background-color: #ffffff;">
                        <h4 class="text-uppercase fw-bold mb-4 text-secondary">Registro Rápido</h4>
                        <div id="fastClock" class="fw-bold text-primary" style="font-size: 3.8rem; line-height: 1;">00:00:00</div>
                        <div id="fastDate" class="fs-5 text-muted mb-4">00/00/0000</div>
                        
                        <form id="fastForm" class="w-100 text-start">
                            <div class="mb-3">
                                <select class="form-select" id="fastType" required>
                                    <option value="" disabled selected>-- Selecione o Tipo de Ponto --</option>
                                    <option value="Entrada">Entrada</option>
                                    <option value="Saída Almoço">Saída para Almoço</option>
                                    <option value="Volta Almoço">Volta do Almoço</option>
                                    <option value="Saída">Saída</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <input type="text" class="form-control" id="fastMatricula" placeholder="Matrícula" required autofocus>
                            </div>
                            <div class="mb-3">
                                <input type="password" class="form-control" id="fastPassword" placeholder="Senha" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold" id="fastBtn" style="background-color: #001f3f;">REGISTRAR PONTO</button>
                        </form>
                    </div>
                </div>

                <!-- LOGIN APP COL -->
                <div class="col-md-6 d-flex align-items-stretch">
                    <div class="card shadow p-4 w-100">
                        <h4 class="text-center mb-4 text-uppercase fw-bold text-primary">Acesso ao Painel<br><span
                                class="text-secondary fs-6 text-capitalize">Ponto Eletrônico SRE</span></h4>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="matricula" class="form-label">Matrícula</label>
                                <input type="text" class="form-control form-control-lg" id="matricula" required placeholder=""
                                    inputmode="text">
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Senha</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <!-- Manual API Override (Hidden) -->
                            <input type="hidden" id="manualApiUrl">

                            <button type="submit" class="btn btn-outline-primary btn-lg w-100" id="loginBtn">Entrar no Sistema</button>
                        </form>
                        <div class="mt-3 text-center">
                            <a href="register.html">Cadastrar novo acesso</a>
                        </div>
                        <div id="message" class="mt-3 text-danger text-center"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Classic Footer -->
        <div class="mt-4 text-center">
            <div style="display: inline-block; text-align: center;">
                <div
                    style="font-family: 'Arial Black', 'Arial', sans-serif; font-weight: 900; font-size: 3rem; color: #f48fb1; line-height: 0.9; text-transform: uppercase; letter-spacing: 1px; text-shadow: 2px 2px 0px rgba(0,0,0,0.1);">
                    CARAPINA</div>
                <div
                    style="font-family: 'Brush Script MT', 'Segoe Script', cursive; font-size: 1.4rem; color: #0d6efd; position: relative; top: -5px;">
                    Superintendência Regional de Educação</div>
                <div style="font-size: 0.65rem; color: #000; opacity: 0.3; margin-top: 5px; letter-spacing: 1px;">MADE
                    IA /
                    GTI SRE CARAPINA </div>
            </div>
        </div>
    </div>
    <!-- End Login Screen Wrapper -->

    <!-- RADAR SCREEN (Hidden by default) -->
    <div id="radarScreen" class="text-center d-none"
        style="position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.98); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <div class="radar-pulse mb-4"></div>
        <h3 class="text-primary fw-bold">Procurando Servidor...</h3>
        <div id="radarStatus" class="fw-bold mb-3 text-primary" style="font-size: 0.9rem;">
            Buscando Sinal...
        </div>

        <!-- Diagnóstico Visual -->
        <div id="radarLogs" class="text-start bg-dark text-success p-2 mb-3 rounded"
            style="font-size: 0.7rem; min-height: 150px; font-family: monospace; overflow-y: auto; width: 100%;">
            > Inicializando Radar v16.0...
        </div>

        <div class="input-group input-group-sm mb-3">
            <input type="text" id="manualApi" class="form-control" placeholder="Link Manual (https://...)">
            <button class="btn btn-primary" onclick="window.setManualApi()">IR</button>
        </div>

        <button id="btnTryAnyway" class="btn btn-outline-secondary btn-sm w-100 mt-2 d-none"
            onclick="window.location.reload()">TENTAR ASSIM MESMO</button>

        <button onclick="window.clearCache()" class="btn btn-sm btn-outline-danger w-100 mb-2">LIMPAR MEMÓRIA E
            REINICIAR</button>
    </div>

    <!-- UI Log Container -->
    <div id="uiLog" class="small text-muted mt-5 px-3" style="max-width: 400px; font-family: monospace; display: none;">
    </div>

    <div class="text-center mt-auto py-4">
        <div class="mt-2 opacity-100 small text-danger fw-bold"></div>
    </div>

    <!-- Forçar limpeza de Service Worker em caso de cache agressivo -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (registrations) {
                for (let registration of registrations) { registration.unregister(); }
            });
        }
    </script>

    <!-- Usar config_v16.js para ignorar caches de nome de arquivo -->
    <!-- Usar config_v16.js para ignorar caches de nome de arquivo -->
    <script src="config.js?t=20260118_PolyfillFix"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const matricula = document.getElementById('matricula').value;
            const password = document.getElementById('password').value;

            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Entrando...';

            try {
                // v16.0: Garantir que o apiFetch existe
                if (!window.apiFetch) { throw new Error("Aguardando sistema..."); }

                const response = await apiFetch(`/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ matricula, password })
                });

                if (response && response.ok) {
                    const data = await response.json();
                    localStorage.setItem('ponto_token', data.token);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_name', data.name);
                    localStorage.setItem('user_matricula', matricula);
                    localStorage.setItem('user_cargo', data.cargo || 'Funcionario');
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'dashboard.html';
                } else if (response && response.status === 401) {
                    alert('Matrícula ou senha incorreta');
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                } else {
                    throw new Error("Conexão falhou");
                }
            } catch (error) {
                console.warn("Login/Network Fail:", error);

                // Mostra o Radar
                document.getElementById('loginScreen').classList.add('d-none');
                document.getElementById('radarScreen').classList.remove('d-none');
                document.getElementById('radarScreen').style.display = 'flex';

                if (window.startRadarMode) {
                    window.startRadarMode((status) => {
                        document.getElementById('radarStatus').innerHTML = status;
                    });
                }

                // X-Ray Diagnostic
                window.logRadar = (msg) => {
                    const logs = document.getElementById('radarLogs');
                    if (logs) {
                        logs.innerHTML += `<div>> ${msg}</div>`;
                        logs.scrollTop = logs.scrollHeight;
                    }
                    if (msg.includes("✅")) {
                        document.getElementById('btnTryAnyway').classList.remove('d-none');
                    }
                };
            }
        });

        // Fast Punch Logic
        setInterval(() => {
            const now = new Date();
            document.getElementById('fastClock').innerText = now.toLocaleTimeString('pt-BR');
            document.getElementById('fastDate').innerText = now.toLocaleDateString('pt-BR');
        }, 1000);

        document.getElementById('fastForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mat = document.getElementById('fastMatricula').value;
            const pwd = document.getElementById('fastPassword').value;
            const type = document.getElementById('fastType').value;
            const btn = document.getElementById('fastBtn');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Lendo GPS...';

            if (!navigator.geolocation) {
                alert("Geolocalização não suportada no seu dispositivo!");
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const acc = position.coords.accuracy;

                btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Autenticando...';
                try {
                    if (!window.apiFetch) { throw new Error("Aguardando sistema..."); }
                    const loginRes = await apiFetch(`/api/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ matricula: mat, password: pwd })
                    });

                    if (!loginRes || !loginRes.ok) {
                        alert('Matrícula ou senha incorreta.');
                        btn.disabled = false;
                        btn.innerHTML = originalText;
                        return;
                    }
                    
                    const loginData = await loginRes.json();
                    const fastToken = loginData.token;

                    btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Processando...';
                    const punchRes = await apiFetch(`/api/punch`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${fastToken}` },
                        body: JSON.stringify({
                            type: type,
                            latitude: lat,
                            longitude: lon,
                            accuracy: acc,
                            neighborhood: "Registro Rápido",
                            city: "Detecção Automática",
                            transaction_id: 'fast_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9)
                        })
                    });

                    if (punchRes.ok) {
                        alert(`PONTO REGISTRADO COM SUCESSO!\n\nMatrícula: ${mat}\nTipo: ${type}\nData/Hora: ${new Date().toLocaleString('pt-BR')}`);
                        document.getElementById('fastForm').reset();
                    } else if (punchRes.status === 409) {
                        alert('Ponto já registrado anteriormente!');
                    } else {
                        const errJs = await punchRes.json().catch(() => ({}));
                        alert("Erro ao registrar ponto: " + (errJs.message || punchRes.statusText));
                    }
                } catch (err) {
                    alert('Erro de conexão. O sistema pode estar offline.');
                }
                btn.disabled = false;
                btn.innerHTML = originalText;

            }, (err) => {
                console.error(err);
                alert("Erro ao acessar a localização! Ative o GPS/Localização do navegador.");
                btn.disabled = false;
                btn.innerHTML = originalText;
            }, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 });
        });

        // Limpeza automática se houver ?reset
        if (new URLSearchParams(window.location.search).get('reset')) {
            localStorage.clear();
            console.log("Storage reset via URL");
        }
    </script>
</body>

</html>
